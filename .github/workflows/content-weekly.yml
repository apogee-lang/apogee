name: Weekly Content Generation

on:
  schedule:
    # Every Monday at 8am EST (1pm UTC)
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    working-directory: content-gen

jobs:
  generate:
    name: Generate Weekly Content
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: content-gen/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Generate comparison post
        run: node src/cli.js comparison --source python

      - name: Generate tutorial (next in rotation)
        run: node src/cli.js tutorial

      - name: Generate corpus examples
        run: node src/cli.js corpus --count 10

      - name: Generate devlog
        run: node src/cli.js devlog

      - name: Create branch and commit
        id: commit
        run: |
          cd ..
          DATE=$(date +%Y-%m-%d)
          BRANCH="content/weekly-${DATE}"
          git checkout -b "$BRANCH"
          git add content-gen/content/
          git add content-gen/.tutorial-state.json || true

          if git diff --staged --quiet; then
            echo "No content changes to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "Apogee Content Bot"
            git config user.email "content-bot@apogee-lang.dev"
            git commit -m "Weekly content — ${DATE}

            Generated automatically by apogee-content-gen:
            - Comparison blog post + social media versions
            - Tutorial article (next in rotation)
            - 10 corpus examples (.apg + .py pairs)
            - Weekly devlog from git history"
            git push origin "$BRANCH"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "date=$DATE" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ..
          gh pr create \
            --title "Weekly content — ${{ steps.commit.outputs.date }}" \
            --body "$(cat <<'PREOF'
          ## Weekly Content Generation

          Automatically generated content for review before publishing.

          ### Included
          - [ ] Comparison blog post (+ Twitter thread + LinkedIn post)
          - [ ] Tutorial article (next in rotation)
          - [ ] 10 corpus examples (.apg + .py pairs)
          - [ ] Weekly devlog (+ social versions)

          ### Review checklist
          - [ ] Code examples compile and run correctly
          - [ ] Tone is appropriate (technical, honest, not marketing fluff)
          - [ ] No factual errors about Apogee's capabilities
          - [ ] Links are correct
          - [ ] Ready to publish

          🤖 Generated with [apogee-content-gen](https://github.com/apogee-lang/apogee/tree/main/content-gen)
          PREOF
          )" \
            --base main \
            --head "${{ steps.commit.outputs.branch }}" \
            --label "content"

      - name: Send Discord notification
        if: steps.commit.outputs.has_changes == 'true' && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"📝 **Weekly content generated** — ${{ steps.commit.outputs.date }}\\n\\nA PR has been opened with this week's content: comparison post, tutorial, 10 corpus examples, and devlog.\\n\\nReview and merge: https://github.com/apogee-lang/apogee/pulls\"}" \
            "$DISCORD_WEBHOOK_URL"
